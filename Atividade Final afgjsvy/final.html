<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Insumos - Construção</title>
    <link rel="stylesheet" href="final.css">
</head>
<body>
    <header>
        <h1>Gestão de Obra</h1>
        <nav>
            <button onclick="mudarAba('dashboard')">Estoque</button>
            <button onclick="mudarAba('cadastro')">Novo Insumo</button>
            <button onclick="mudarAba('movimentacao')">Movimentar</button>
        </nav>
    </header>

    <main>
        <section id="dashboard" class="aba ativa">
            <h2>Estoque Disponível</h2>
            <table>
                <thead>
                    <tr>
                        <th>Insumo</th>
                        <th>Estoque Atual</th>
                        <th>Unidade</th>
                        <th>Validade</th>
                    </tr>
                </thead>
                <tbody id="tabela-estoque">
                </tbody>
            </table>
        </section>

        <section id="cadastro" class="aba">
            <h2>Cadastrar Novo Insumo</h2>
            <form id="form-produto">
                <div class="form-group">
                    <label for="nome-produto">Nome do Insumo</label>
                    <input type="text" id="nome-produto" required placeholder="Ex: Cimento CP II">
                </div>
                <div class="form-group">
                    <label for="categoria">Categoria</label>
                    <input type="text" id="categoria" required placeholder="Ex: Alvenaria">
                </div>
                <div class="form-group">
                    <label for="unidade">Unidade de Medida</label>
                    <select id="unidade" required>
                        <option value="sc">Saco (sc)</option>
                        <option value="kg">Quilograma (kg)</option>
                        <option value="un">Unidade (un)</option>
                        <option value="m3">Metro Cúbico (m³)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="validade">Data de Validade (Opcional)</label>
                    <input type="date" id="validade">
                </div>
                <button type="submit">Salvar Insumo</button>
            </form>
        </section>

        <section id="movimentacao" class="aba">
            <h2>Registrar Entrada ou Saída</h2>
            <form id="form-movimentacao">
                <div class="form-group">
                    <label for="select-produto">Insumo</label>
                    <select id="select-produto" required>
                    </select>
                </div>
                <div class="form-group">
                    <label for="tipo-movimentacao">Tipo</label>
                    <select id="tipo-movimentacao" required>
                        <option value="ENTRADA">Entrada (Compra/Recebimento)</option>
                        <option value="SAIDA">Saída (Uso na Obra)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="quantidade">Quantidade</label>
                    <input type="number" step="0.01" id="quantidade" required>
                </div>
                <button type="submit">Registrar Movimentação</button>
            </form>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="final.js"></script>
</body>
</html>
